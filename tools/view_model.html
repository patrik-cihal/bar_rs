<!DOCTYPE html>
<html>
<head>
<title>ARMCOM Model Viewer</title>
<style>
body { margin: 0; background: #1a1a2e; overflow: hidden; }
canvas { display: block; }
#info { position: absolute; top: 10px; left: 10px; color: #ccc; font-family: monospace; font-size: 14px; }
</style>
</head>
<body>
<div id="info">Drag to rotate, scroll to zoom. Loading model...</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(40, 40, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 25, 0);
controls.update();

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.8);
fillLight.position.set(-5, 5, -3);
scene.add(fillLight);

const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
scene.add(ambientLight);

// Grid
const grid = new THREE.GridHelper(100, 20, 0x444466, 0x333355);
scene.add(grid);

// Team colors
const BLUE_TEAM = new THREE.Color(0.2, 0.4, 1.0);
const teamMaterials = {
  torso:    new THREE.MeshStandardMaterial({ color: BLUE_TEAM, metalness: 0.4, roughness: 0.5 }),
  pelvis:   new THREE.MeshStandardMaterial({ color: BLUE_TEAM, metalness: 0.4, roughness: 0.5 }),
  head:     new THREE.MeshStandardMaterial({ color: new THREE.Color(0.44, 0.58, 1.0), metalness: 0.5, roughness: 0.4 }),
  dish:     new THREE.MeshStandardMaterial({ color: new THREE.Color(0.7, 0.7, 0.75), metalness: 0.9, roughness: 0.2 }),
  biggun:   new THREE.MeshStandardMaterial({ color: new THREE.Color(0.15, 0.15, 0.2), metalness: 0.8, roughness: 0.3 }),
  barrel:   new THREE.MeshStandardMaterial({ color: new THREE.Color(0.15, 0.15, 0.2), metalness: 0.8, roughness: 0.3 }),
  bigguncyl:new THREE.MeshStandardMaterial({ color: new THREE.Color(0.15, 0.15, 0.2), metalness: 0.8, roughness: 0.3 }),
  rloarm:   new THREE.MeshStandardMaterial({ color: new THREE.Color(0.15, 0.15, 0.2), metalness: 0.8, roughness: 0.3 }),
  cagelight:new THREE.MeshStandardMaterial({ color: new THREE.Color(0.8, 0.85, 0.6), emissive: new THREE.Color(0.4, 0.42, 0.3), metalness: 0.2, roughness: 0.3 }),
  armhexl:  new THREE.MeshStandardMaterial({ color: new THREE.Color(0.8, 0.85, 0.6), emissive: new THREE.Color(0.4, 0.42, 0.3), metalness: 0.2, roughness: 0.3 }),
  armhexl2: new THREE.MeshStandardMaterial({ color: new THREE.Color(0.8, 0.85, 0.6), emissive: new THREE.Color(0.4, 0.42, 0.3), metalness: 0.2, roughness: 0.3 }),
};
// Limbs
const limbMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(0.35, 0.45, 0.75), metalness: 0.5, roughness: 0.5 });
['lthigh','rthigh','lleg','rleg','lfoot','rfoot','luparm','ruparm'].forEach(n => teamMaterials[n] = limbMat);

const loader = new GLTFLoader();
loader.load('../assets/models/armcom.glb', (gltf) => {
  const model = gltf.scene;

  // Apply per-piece materials
  model.traverse((child) => {
    if (child.isMesh) {
      const name = child.name || child.parent?.name || '';
      if (teamMaterials[name]) {
        child.material = teamMaterials[name];
      } else {
        child.material = teamMaterials.torso.clone();
      }
    }
  });

  scene.add(model);

  // Print piece hierarchy
  let info = 'Model loaded. Pieces:\n';
  model.traverse((child) => {
    if (child.isMesh) {
      const geo = child.geometry;
      info += `  ${child.name}: ${geo.attributes.position.count} verts\n`;
    }
  });
  document.getElementById('info').textContent = info;
  console.log(info);
}, undefined, (error) => {
  document.getElementById('info').textContent = 'Error loading model: ' + error;
});

// Walk animation
let walkPhase = 0;
let walking = false;
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') walking = !walking;
});
document.getElementById('info').textContent += '\nPress SPACE to toggle walk animation';

function degToRad(d) { return d * Math.PI / 180; }

function walkLerp(keyframes, phase) {
  const p = ((phase % 1) + 1) % 1;
  let prev = keyframes[keyframes.length - 1];
  for (const kf of keyframes) {
    if (kf[0] >= p) {
      let span = kf[0] > prev[0] ? kf[0] - prev[0] : 1 - prev[0] + kf[0];
      let t = span > 0.001 ? (kf[0] >= prev[0] ? (p - prev[0]) / span : ((p - prev[0] + 1) % 1) / span) : 0;
      return prev[1] + (kf[1] - prev[1]) * t;
    }
    prev = kf;
  }
  return prev[1];
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  if (walking) walkPhase += dt * 2.5;

  scene.traverse((child) => {
    if (!child.name) return;
    const name = child.name;

    if (!walking) {
      if (name === 'dish') child.rotation.set(0, t * 2, 0);
      else if (name === 'lthigh' || name === 'rthigh') child.rotation.set(degToRad(-20), 0, 0);
      else if (name === 'lleg' || name === 'rleg') child.rotation.set(degToRad(22), 0, 0);
      return;
    }

    const p = walkPhase;
    const p2 = (walkPhase + 0.5) % 1;

    switch(name) {
      case 'pelvis': {
        const bob = walkLerp([[0,-2.5],[0.25,-1.5],[0.5,-2.5],[0.75,-1.5]], p);
        const yaw = walkLerp([[0,-5],[0.25,0],[0.5,5],[0.75,0]], p);
        const roll = walkLerp([[0,-4],[0.25,0],[0.5,4],[0.75,0]], p);
        child.position.y = 31 + bob;
        child.rotation.set(0, degToRad(yaw), degToRad(roll));
        break;
      }
      case 'lthigh': {
        const pitch = walkLerp([[0,-50],[0.125,-35],[0.25,10],[0.375,20],[0.5,15],[0.625,0],[0.75,-30],[0.875,-50]], p);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'rthigh': {
        const pitch = walkLerp([[0,-50],[0.125,-35],[0.25,10],[0.375,20],[0.5,15],[0.625,0],[0.75,-30],[0.875,-50]], p2);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'lleg': {
        const pitch = walkLerp([[0,55],[0.125,30],[0.25,10],[0.375,5],[0.5,20],[0.625,60],[0.75,90],[0.875,70]], p);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'rleg': {
        const pitch = walkLerp([[0,55],[0.125,30],[0.25,10],[0.375,5],[0.5,20],[0.625,60],[0.75,90],[0.875,70]], p2);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'lfoot': {
        const pitch = walkLerp([[0,-30],[0.25,5],[0.5,10],[0.75,-20]], p);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'rfoot': {
        const pitch = walkLerp([[0,-30],[0.25,5],[0.5,10],[0.75,-20]], p2);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'luparm': {
        const pitch = walkLerp([[0,15],[0.25,-5],[0.5,-10],[0.75,15]], p);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'ruparm': {
        const pitch = walkLerp([[0,15],[0.25,-5],[0.5,-10],[0.75,15]], p2);
        child.rotation.set(degToRad(pitch), 0, 0);
        break;
      }
      case 'head': {
        const yaw = walkLerp([[0,-5],[0.25,0],[0.5,5],[0.75,0]], p);
        child.rotation.set(0, degToRad(yaw), 0);
        break;
      }
      case 'dish':
        child.rotation.set(0, t * 3, 0);
        break;
      case 'torso': {
        const yaw = walkLerp([[0,3],[0.25,0],[0.5,-3],[0.75,0]], p);
        child.rotation.set(0, degToRad(yaw), 0);
        break;
      }
    }
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
